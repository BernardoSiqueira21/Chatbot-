<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsumidorBot · Minimal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-layout">
        
        <div class="main-container">
            <header class="top-bar">
                <div class="top-bar-content">
                    <div class="brand-info">
                        <div class="brand-logo">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2L13.8 8.2H20.4L15 11.8L16.8 18L12 14.4L7.2 18L9 11.8L3.6 8.2H10.2L12 2Z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="brand-text">
                            <span id="agent-name" class="brand-name">ConsumidorBot</span>
                            <span class="brand-status">Online</span>
                        </div>
                    </div>

                    <div class="header-actions">
                        <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Alternar tema">
                            <span class="theme-icon-light">☀️</span>
                            <span class="theme-icon-dark">🌙</span>
                        </button>
                        <button id="clear-button" class="icon-btn" type="button" title="Nova conversa">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </header>

            <main class="chat-area">
                <section class="chat-messages" id="chat-box"></section>
            </main>

            <footer class="bottom-bar">
                <div class="bottom-bar-content">
                    <div class="input-wrap">
                        <textarea
                            id="user-input"
                            placeholder="Mensagem para o ConsumidorBot..."
                            autocomplete="off"
                            rows="1"
                        ></textarea>
                        <button id="send-button" class="send-btn" type="button">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 4L12 20M12 4L6 10M12 4L18 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div class="disclaimer">
                        As respostas são geradas por IA educacional e não substituem orientação jurídica oficial.
                    </div>
                </div>
            </footer>
        </div>

        <div id="stats-panel" class="stats-monitor" style="display: none;">
            </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
